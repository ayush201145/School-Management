# Project-wide Gradle settings.

# Standard Android/Kotlin project settings
android.useAndroidX=true
kotlin.code.style=official

# Defensive flag for Room's KSP processor on Kotlin 1.9.x — documented
# as required for Kotlin Multiplatform targets; included here as a
# harmless no-op safeguard since we're on Kotlin 1.9.24. Not needed if
# you upgrade this project to Kotlin 2.0+.
kotlin.native.disableCompilerDaemon=true

# Increases the JVM heap for the Gradle daemon — Room + Hilt + KSP
# annotation processing across ~17 entities can be memory-hungry on
# the default heap size, especially on a first/clean build.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
